<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Incidentes — Changelog</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>


<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#2563eb;flex-shrink:0">
    <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/>
  </svg>
  <h1>Incidentes de RED — Historial</h1>
</header>

<div class="search-bar">
  <label for="q">Clave:</label>
  <input type="text" id="q" placeholder="INC-186671" autocomplete="off" spellcheck="false">
  <button class="btn primary" onclick="search()">Buscar</button>
  <button class="btn ghost" onclick="clearSearch()">Limpiar</button>
</div>


<div class="main">
  <div id="errMsg" style="display:none" class="err-msg"></div>
  <div id="resultCount" class="result-count" style="display:none"></div>
  <div id="results">
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Ingresa una clave de incidente para ver su historial.</p>
    </div>
  </div>
</div>

</body>
</html>
